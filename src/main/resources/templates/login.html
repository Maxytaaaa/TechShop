<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Sign In')}"></head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="auth-page">
    <div class="auth-box fade-up">
        <div class="auth-box__logo">Tech<span style="font-weight:300">Shop</span></div>
        <h1>Sign In</h1>
        <p class="auth-box__sub">Enter your credentials to continue</p>

        <div th:if="${param.registered}" class="alert alert--success">
            Registration successful! Please sign in.
        </div>
        <div th:if="${param.error}" class="alert alert--error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert--success">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn--primary btn--full">Sign In</button>
        </form>

        <div class="auth-divider">or</div>

        <a th:href="@{/oauth2/authorization/google}" class="btn btn--outline btn--full"
           style="display:flex;align-items:center;justify-content:center;gap:0.5rem;">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335"
                      d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4"
                      d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05"
                      d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853"
                      d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </a>

        <div class="auth-link" style="margin-top:1rem;">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
