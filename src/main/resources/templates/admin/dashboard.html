<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Admin — Dashboard')}"></head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="admin-sidebar__logo">Admin Panel</div>
        <nav>
            <a th:href="@{/admin}" class="admin-nav__link active">
                <span>◈</span> Dashboard
            </a>
            <a th:href="@{/admin/products}" class="admin-nav__link">
                <span>◻</span> Products
            </a>
            <a th:href="@{/admin/categories}" class="admin-nav__link">
                <span>◈</span> Categories
            </a>
            <a th:href="@{/admin/orders}" class="admin-nav__link">
                <span>◎</span> Orders
            </a>
            <a th:href="@{/}" class="admin-nav__link">
                <span>←</span> Back to Site
            </a>
        </nav>
    </aside>

    <main class="admin-content">
        <div class="admin-page-header">
            <h1>Dashboard</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card fade-up">
                <div class="stat-card__label">Total Products</div>
                <div class="stat-card__value" th:text="${productsCount}">0</div>
            </div>
            <div class="stat-card fade-up fade-up-1">
                <div class="stat-card__label">Total Orders</div>
                <div class="stat-card__value" th:text="${ordersCount}">0</div>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <a th:href="@{/admin/products/new}" class="btn btn--primary">+ New Product</a>
            <a th:href="@{/admin/categories/new}" class="btn btn--outline">+ New Category</a>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
